<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F4F4F8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script>
    (function() {
      if (localStorage.getItem('jeopardy-dark')) {
        document.documentElement.setAttribute('data-theme', 'dark');
        var tc = document.querySelector('meta[name="theme-color"]');
        var sb = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
        if (tc) tc.setAttribute('content', '#111118');
        if (sb) sb.setAttribute('content', 'black-translucent');
      }
    })();
    </script>
    <title>Fun Jeopardy — ExplAIn Sims</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <script src="/assets/sw-register.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

        :root {
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --bg-color: #F4F4F8;
            --bg-pattern: #EAEAEF;
            --text-main: #1A1A2E;
            --text-secondary: #6B7280;

            --brand-primary: #0891B2;
            --brand-secondary: #0E7490;
            --brand-accent: #F59E0B;

            --card-bg: #FFFFFF;
            --card-border: #E5E7EB;

            --nav-bg: rgba(255, 255, 255, 0.92);
            --nav-border: rgba(0, 0, 0, 0.10);

            /* Jeopardy-specific colors */
            --jep-blue-dark: #1a237e;
            --jep-blue-mid: #283593;
            --jep-blue-light: #3949ab;
            --jep-blue-lighter: #5c6bc0;
            --jep-gold: #ffd600;
            --jep-gold-dark: #ffab00;
            --jep-text: #ffffff;
            --jep-used: #1a1a3e;
            --jep-used-text: #555577;
        }

        [data-theme="dark"] {
            --bg-color: #111118;
            --bg-pattern: #1E1E28;
            --text-main: #F0F0F5;
            --text-secondary: #9CA3AF;

            --brand-primary: #22D3EE;
            --brand-secondary: #06B6D4;
            --brand-accent: #FBBF24;

            --card-bg: #1E1E28;
            --card-border: #2A2A36;

            --nav-bg: rgba(17, 17, 24, 0.92);
            --nav-border: rgba(255, 255, 255, 0.08);

            --jep-blue-dark: #0d1247;
            --jep-blue-mid: #151c6b;
            --jep-blue-light: #1e2a7a;
            --jep-blue-lighter: #3949ab;
            --jep-gold: #ffd600;
            --jep-gold-dark: #ffab00;
            --jep-text: #f0f0f5;
            --jep-used: #0a0a1e;
            --jep-used-text: #444466;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* ── Banner ── */
        .banner {
            position: sticky; top: 0; z-index: 100;
            background: var(--nav-bg);
            border-bottom: 1px solid var(--nav-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; height: 52px;
        }
        .banner-logo { display: flex; align-items: center; gap: 4px; text-decoration: none; }
        .banner-logo img { width: 28px; height: 28px; border-radius: 6px; }
        .banner-title {
            font-family: var(--font-display);
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }
        .banner-title.gradient-text {
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .banner-actions { display: flex; align-items: center; gap: 8px; }
        #theme-button {
            background: none; border: none; cursor: pointer;
            font-size: 1.2rem; padding: 6px; border-radius: 8px;
            transition: background 0.15s; line-height: 1;
        }
        #theme-button:hover { background: var(--card-border); }

        /* ── Main container ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 12px 36px;
        }

        /* ── Jeopardy game area ── */
        #game-container {
            width: 100%;
            max-width: 1100px;
        }

        /* ── Setup screen ── */
        .setup-panel {
            background: linear-gradient(180deg, var(--jep-blue-mid), var(--jep-blue-dark));
            border-radius: 12px;
            padding: 24px;
            color: var(--jep-text);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .setup-panel h1 {
            font-family: var(--font-display);
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            text-align: center;
            color: var(--jep-gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            margin-bottom: 8px;
        }
        .setup-divider {
            width: 100%;
            height: 4px;
            background: var(--jep-gold);
            border: none;
            border-radius: 2px;
            margin-bottom: 20px;
        }
        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 640px) {
            .setup-grid { grid-template-columns: 1fr; }
        }
        .setup-section {
            background: linear-gradient(180deg, var(--jep-blue-light), var(--jep-blue-mid));
            border-radius: 10px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .setup-section h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--jep-gold);
            margin-bottom: 12px;
        }
        .setup-section h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--jep-gold);
            margin-bottom: 10px;
        }
        .setup-section label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
        }

        /* Slider */
        .slider-wrap {
            display: flex;
            align-items: center;
            background: var(--jep-blue-dark);
            padding: 8px 12px;
            border-radius: 8px;
        }
        .slider-wrap input[type="range"] {
            flex: 1;
            margin-right: 12px;
            accent-color: var(--jep-gold);
        }
        .slider-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--jep-gold);
            min-width: 28px;
            text-align: center;
        }

        /* Team name rows */
        .team-row {
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, var(--jep-blue-lighter), var(--jep-blue-light));
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            transition: background 0.2s;
        }
        .team-row:hover {
            background: linear-gradient(90deg, #7986cb, var(--jep-blue-lighter));
        }
        .team-row span { flex: 1; font-weight: 700; }
        .team-row input[type="text"] {
            flex: 1;
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            font-size: 0.95rem;
            color: #1a1a2e;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 24px;
            border: none;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.98); }
        .btn-blue {
            background: linear-gradient(180deg, var(--jep-blue-lighter), var(--jep-blue-light));
            color: var(--jep-text);
        }
        .btn-purple {
            background: linear-gradient(180deg, #7c4dff, #651fff);
            color: #fff;
        }
        .btn-green {
            background: linear-gradient(180deg, #4caf50, #388e3c);
            color: #fff;
        }
        .btn-start {
            background: linear-gradient(180deg, var(--jep-gold), var(--jep-gold-dark));
            color: var(--jep-blue-dark);
            font-size: 1.2rem;
            padding: 14px 32px;
        }
        .btn-start:hover { transform: scale(1.1); }
        .btn-red {
            background: linear-gradient(180deg, #ef5350, #d32f2f);
            color: #fff;
        }
        .btn-orange {
            background: linear-gradient(180deg, #ff9800, #f57c00);
            color: #fff;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
        }

        /* Buttons row */
        .setup-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }

        /* Expandable sections (rules, editor, import) */
        .expand-section {
            margin-top: 16px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .expand-section .panel {
            background: var(--jep-blue-light);
            border-radius: 10px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }
        .expand-section .panel h3 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--jep-gold);
            margin-bottom: 12px;
        }
        .expand-section ol {
            padding-left: 20px;
        }
        .expand-section ol li {
            margin-bottom: 6px;
        }

        /* ── Game board ── */
        .board-header {
            font-family: var(--font-display);
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 700;
            text-align: center;
            color: var(--jep-gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            margin-bottom: 16px;
        }
        .board-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .cat-cell {
            background: var(--jep-blue-lighter);
            text-align: center;
            padding: 10px 4px;
            border-radius: 6px;
            font-weight: 700;
            font-size: clamp(0.7rem, 1.5vw, 0.95rem);
            color: var(--jep-text);
            word-break: break-word;
        }
        .q-cell {
            background: var(--jep-blue-lighter);
            text-align: center;
            padding: 16px 4px;
            border-radius: 6px;
            font-weight: 700;
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            color: var(--jep-gold);
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            border: none;
            width: 100%;
        }
        .q-cell:hover:not(.used) {
            background: #5c6bc0;
            transform: scale(1.03);
        }
        .q-cell.used {
            background: var(--jep-used);
            color: var(--jep-used-text);
            cursor: default;
        }

        /* ── Scores panel ── */
        .scores-panel {
            background: var(--jep-blue-mid);
            padding: 16px;
            border-radius: 10px;
        }
        .scores-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .scores-header h2 {
            font-size: 1.15rem;
            font-weight: 600;
        }
        .scores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }
        .team-card {
            background: var(--jep-blue-light);
            padding: 12px;
            border-radius: 10px;
            transition: background 0.2s;
        }
        .team-card.active {
            background: var(--jep-gold);
            color: var(--jep-blue-dark);
        }
        .team-card .team-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
        }
        .team-card .team-info .score {
            font-size: 1.2rem;
        }
        .team-card .team-btns {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .team-card .team-btns button {
            padding: 4px 10px;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            color: #fff;
            transition: filter 0.15s;
        }
        .team-card .team-btns button:hover { filter: brightness(1.15); }
        .team-card .team-btns .minus { background: #d32f2f; }
        .team-card .team-btns .plus { background: #388e3c; }
        .team-card .team-btns .select { background: var(--jep-blue-lighter); margin-left: auto; }

        /* ── Question modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: linear-gradient(180deg, var(--jep-blue-light), var(--jep-blue-mid));
            border-radius: 12px;
            padding: 24px;
            max-width: 640px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            color: var(--jep-text);
        }
        .modal-cat {
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--jep-gold);
            margin-bottom: 8px;
        }
        .modal-question {
            background: linear-gradient(180deg, var(--jep-blue-mid), var(--jep-blue-dark));
            padding: 24px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .modal-answer {
            background: linear-gradient(180deg, var(--jep-gold), var(--jep-gold-dark));
            color: var(--jep-blue-dark);
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .modal-teams-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .modal-teams-grid button {
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            color: #fff;
            transition: transform 0.1s, filter 0.1s;
        }
        .modal-teams-grid button:hover { transform: scale(1.04); filter: brightness(1.1); }
        .modal-teams-grid .correct { background: linear-gradient(180deg, #4caf50, #388e3c); }
        .modal-teams-grid .incorrect { background: linear-gradient(180deg, #ef5350, #d32f2f); }
        .modal-close-row {
            display: flex;
            justify-content: center;
        }

        /* ── Editor ── */
        .editor-panel {
            background: var(--jep-blue-dark);
            border-radius: 10px;
            padding: 16px;
        }
        .editor-panel h3 {
            color: var(--jep-gold);
            font-size: 1.15rem;
            margin-bottom: 12px;
        }
        .editor-panel h4 {
            color: #ffd54f;
            font-size: 1rem;
            margin-bottom: 8px;
        }
        .editor-cats input {
            width: 100%;
            padding: 8px 10px;
            border-radius: 6px;
            border: none;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #1a1a2e;
        }
        .editor-mini-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px;
            margin-bottom: 6px;
        }
        .editor-mini-grid button,
        .editor-mini-grid div {
            text-align: center;
            padding: 6px 2px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .editor-mini-grid .cat-label {
            background: var(--jep-blue-lighter);
            color: var(--jep-text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .editor-mini-grid .val-btn {
            background: var(--jep-blue-lighter);
            color: var(--jep-text);
            border: none;
            cursor: pointer;
            transition: background 0.15s;
        }
        .editor-mini-grid .val-btn:hover { background: #5c6bc0; }

        /* Editor form for a single question */
        .editor-form {
            background: var(--jep-blue-mid);
            padding: 16px;
            border-radius: 10px;
            margin-top: 12px;
        }
        .editor-form label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            color: var(--jep-text);
        }
        .editor-form textarea,
        .editor-form input[type="text"],
        .editor-form input[type="number"] {
            width: 100%;
            padding: 8px 10px;
            border-radius: 6px;
            border: none;
            font-size: 0.9rem;
            color: #1a1a2e;
            margin-bottom: 10px;
        }
        .editor-form textarea { resize: vertical; min-height: 60px; }
        .editor-form .form-btns {
            display: flex;
            gap: 8px;
        }

        /* ── Import section ── */
        .import-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 640px) {
            .import-grid { grid-template-columns: 1fr; }
        }
        .import-box {
            background: var(--jep-blue-mid);
            border-radius: 10px;
            padding: 14px;
        }
        .import-box h4 {
            color: #ffd54f;
            margin-bottom: 8px;
        }
        .import-box p {
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        .import-box ol {
            padding-left: 20px;
            font-size: 0.85rem;
        }
        .import-box ol li { margin-bottom: 4px; }
        .import-box ul { padding-left: 20px; font-size: 0.82rem; }
        .import-box ul li { margin-bottom: 2px; }
        .import-error {
            background: #d32f2f;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            font-size: 0.85rem;
        }
        .import-instructions {
            background: var(--jep-blue-light);
            border-radius: 10px;
            padding: 14px;
            margin-top: 10px;
        }

        /* Hidden file input */
        .hidden { display: none; }
    </style>
</head>
<body>

<!-- ── Banner ── -->
<header class="banner">
    <div class="banner-logo">
        <a href="/" title="Home"><img src="/assets/favicon.png" alt="Home"></a>
        <button onclick="history.back()" title="Go back" aria-label="Go back"
            style="background:none;border:none;cursor:pointer;padding:4px;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;margin-left:6px;color:inherit;border-radius:6px;opacity:0.65;"
            onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.65'">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
    </div>
    <div class="banner-title">Fun Jeopardy</div>
    <div class="banner-actions">
        <div class="theme-toggle">
            <button id="theme-button" aria-label="Toggle Light/Dark Theme" title="Toggle between light and dark themes"></button>
        </div>
    </div>
</header>

<!-- ── Main ── -->
<main>
    <div id="game-container">
        <!-- SETUP SCREEN -->
        <div id="setup-screen" class="setup-panel">
            <h1>Fun Jeopardy!</h1>
            <hr class="setup-divider">
            <!-- Stage 2 will populate: team config, buttons -->
            <p style="text-align:center; opacity:0.7;">Loading game...</p>
        </div>

        <!-- GAME SCREEN (hidden initially) -->
        <div id="game-screen" style="display:none;">
            <!-- Stage 3 will populate: board + scores -->
        </div>

        <!-- QUESTION MODAL -->
        <div id="question-modal" class="modal-overlay">
            <div class="modal-box">
                <!-- Stage 3 will populate -->
            </div>
        </div>
    </div>
</main>

<!-- ── Footer ── -->
<div id="site-footer"></div>
<script src="/assets/footer.js"></script>

<!-- ── Theme toggle JS ── -->
<script>
const themeButton = document.getElementById('theme-button');
const DARK_KEY = 'jeopardy-dark';
const LIGHT_KEY = 'jeopardy-light';

function updateAppChromeTheme(theme) {
    var tc = document.querySelector('meta[name="theme-color"]');
    var sb = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
    var dark = theme === 'dark';
    if (tc) tc.setAttribute('content', dark ? '#111118' : '#F4F4F8');
    if (sb) sb.setAttribute('content', dark ? 'black-translucent' : 'default');
}
function updateButtonEmoji(theme) {
    themeButton.textContent = theme === 'dark' ? '\u{1F319}' : '\u{2600}\uFE0F';
}
var initTheme = localStorage.getItem(DARK_KEY) ? 'dark' : 'light';
document.documentElement.setAttribute('data-theme', initTheme);
updateAppChromeTheme(initTheme);
updateButtonEmoji(initTheme);
window.addEventListener('pageshow', function () {
    updateAppChromeTheme(document.documentElement.getAttribute('data-theme'));
});
themeButton.addEventListener('click', function () {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    if (next === 'dark') {
        localStorage.setItem(DARK_KEY, 'true');
        localStorage.removeItem(LIGHT_KEY);
    } else {
        localStorage.setItem(LIGHT_KEY, 'true');
        localStorage.removeItem(DARK_KEY);
    }
    updateAppChromeTheme(next);
    updateButtonEmoji(next);
});
</script>

<!-- Brave iOS gradient text fix -->
<script>
(function () {
    if (/iP(hone|ad|od)/.test(navigator.userAgent) && navigator.brave) return;
    document.querySelectorAll('.banner-title').forEach(function (el) { el.classList.add('gradient-text'); });
})();
</script>
