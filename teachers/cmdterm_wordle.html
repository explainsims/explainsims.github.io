<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F4F4F8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script>
    (function() {
      if (localStorage.getItem('cmdterm-wordle-dark')) {
        document.documentElement.setAttribute('data-theme', 'dark');
        var tc = document.querySelector('meta[name="theme-color"]');
        var sb = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
        if (tc) tc.setAttribute('content', '#111118');
        if (sb) sb.setAttribute('content', 'black-translucent');
      }
    })();
    </script>
    <title>Command Term Wordle — ExplAIn Sims</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <script src="/assets/sw-register.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

        :root {
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --bg-color: #F4F4F8;
            --bg-pattern: #EAEAEF;
            --text-main: #1A1A2E;
            --text-secondary: #6B7280;

            --brand-primary: #0891B2;
            --brand-secondary: #0E7490;
            --brand-accent: #F59E0B;

            --card-bg: #FFFFFF;
            --card-border: #E5E7EB;

            --nav-bg: rgba(255, 255, 255, 0.92);
            --nav-border: rgba(0, 0, 0, 0.10);

            --correct: #059669;
            --present: #D97706;
            --absent-bg: #9CA3AF;
            --absent-text: #fff;
            --cell-border: #D1D5DB;
            --cell-border-filled: #9CA3AF;
            --cell-bg: #FFFFFF;
            --key-bg: #E5E7EB;
            --key-text: #1A1A2E;
        }

        [data-theme="dark"] {
            --bg-color: #111118;
            --bg-pattern: #1E1E28;
            --text-main: #F0F0F5;
            --text-secondary: #9CA3AF;

            --brand-primary: #22D3EE;
            --brand-secondary: #06B6D4;
            --brand-accent: #FBBF24;

            --card-bg: #1E1E28;
            --card-border: #2A2A36;

            --nav-bg: rgba(17, 17, 24, 0.92);
            --nav-border: rgba(255, 255, 255, 0.08);

            --correct: #34D399;
            --present: #FBBF24;
            --absent-bg: #374151;
            --absent-text: #F0F0F5;
            --cell-border: #3A3A50;
            --cell-border-filled: #6B7280;
            --cell-bg: #1E1E28;
            --key-bg: #2A2A3C;
            --key-text: #F0F0F5;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* ── Banner ── */
        .banner {
            position: sticky; top: 0; z-index: 100;
            background: var(--nav-bg);
            border-bottom: 1px solid var(--nav-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; height: 52px;
        }
        .banner-logo { display: flex; align-items: center; gap: 4px; text-decoration: none; }
        .banner-logo img { width: 28px; height: 28px; border-radius: 6px; }
        .banner-title {
            font-family: var(--font-display);
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }
        .banner-title.gradient-text {
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .banner-actions { display: flex; align-items: center; gap: 8px; }
        #theme-button {
            background: none; border: none; cursor: pointer;
            font-size: 1.2rem; padding: 6px; border-radius: 8px;
            transition: background 0.15s; line-height: 1;
        }
        #theme-button:hover { background: var(--card-border); }

        /* ── Main ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 12px 36px;
            gap: 16px;
        }

        /* ── Controls ── */
        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .controls label {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        select {
            padding: 7px 10px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
            max-width: 220px;
        }
        .new-btn {
            padding: 7px 14px;
            border-radius: 8px;
            border: none;
            background: var(--brand-primary);
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        [data-theme="dark"] .new-btn { color: #111118; }

        /* ── Game info ── */
        #game-info {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            min-height: 16px;
        }

        /* ── Message ── */
        #message {
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            min-height: 22px;
            color: var(--text-main);
        }
        #message.win  { color: var(--correct); }
        #message.lose { color: #DC2626; }

        /* ── Grid ── */
        #grid {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .grid-row { display: flex; gap: 5px; }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            text-transform: uppercase;
            border: 2px solid var(--cell-border);
            background: var(--cell-bg);
            border-radius: 4px;
            user-select: none;
            transition: border-color 0.08s;
        }
        .cell.filled  { border-color: var(--cell-border-filled); }
        .cell.correct { background: var(--correct);   border-color: var(--correct);   color: #fff; }
        .cell.present { background: var(--present);   border-color: var(--present);   color: #fff; }
        .cell.absent  { background: var(--absent-bg); border-color: var(--absent-bg); color: var(--absent-text); }

        @keyframes pop {
            0%,100% { transform: scale(1); }
            40%     { transform: scale(1.14); }
        }
        .cell.pop { animation: pop 0.12s ease; }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%     { transform: translateX(-5px); }
            40%     { transform: translateX(5px); }
            60%     { transform: translateX(-3px); }
            80%     { transform: translateX(3px); }
        }
        .row-shake .cell { animation: shake 0.38s ease; }

        @keyframes flip-in {
            0%   { transform: scaleY(1); }
            50%  { transform: scaleY(0); }
            100% { transform: scaleY(1); }
        }
        .cell.flip { animation: flip-in 0.3s ease; }

        /* ── Keyboard ── */
        #keyboard {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }
        .key-row {
            display: flex;
            gap: 5px;
            justify-content: center;
        }
        .key {
            height: 52px;
            min-width: 34px;
            padding: 0 6px;
            border-radius: 6px;
            border: 1px solid var(--card-border);
            background: var(--key-bg);
            color: var(--key-text);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            user-select: none;
            transition: background 0.12s, color 0.12s, border-color 0.12s;
            -webkit-tap-highlight-color: transparent;
        }
        .key.wide { min-width: 54px; font-size: 11px; letter-spacing: 0; }
        .key.correct { background: var(--correct);   border-color: var(--correct);   color: #fff; }
        .key.present { background: var(--present);   border-color: var(--present);   color: #fff; }
        .key.absent  { background: var(--absent-bg); border-color: var(--absent-bg); color: var(--absent-text); }
        [data-theme="dark"] .key.correct { color: #111118; }
        [data-theme="dark"] .key.present { color: #111118; }

        @media (max-width: 380px) {
            .key { min-width: 28px; height: 46px; font-size: 12px; }
            .key.wide { min-width: 44px; }
        }
    </style>
</head>
<body>

<header class="banner">
    <div class="banner-logo">
        <a href="/" title="Home"><img src="/assets/favicon.png" alt="Home"></a>
        <button onclick="history.back()" title="Go back" aria-label="Go back"
            style="background:none;border:none;cursor:pointer;padding:4px;display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;margin-left:6px;color:inherit;border-radius:6px;opacity:0.65;"
            onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.65'">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
    </div>
    <div class="banner-title">Command Term Wordle</div>
    <div class="banner-actions">
        <div class="theme-toggle">
            <button id="theme-button" aria-label="Toggle Light/Dark Theme" title="Toggle between light and dark themes">☀️</button>
        </div>
    </div>
</header>

<main>
    <div class="controls">
        <label for="subject-select">Subject:</label>
        <select id="subject-select"></select>
        <button class="new-btn" id="new-btn">New word</button>
    </div>

    <div id="game-info"></div>
    <div id="message" role="status" aria-live="polite"></div>
    <div id="grid" aria-label="Game board"></div>
    <div id="keyboard" aria-label="On-screen keyboard"></div>
</main>

<script>
// ── Command term data (single-word only) ─────────────────────────────────────
const SUBJECTS_RAW = {
  "Language A: Literature":
    "Analyse,Comment,Compare,Contrast,Describe,Discuss,Evaluate,Examine,Explain,Explore,Interpret,Investigate,Justify,List,Outline,Present",
  "Language A: Language & Literature":
    "Analyse,Comment,Compare,Contrast,Describe,Discuss,Evaluate,Examine,Explain,Explore,Interpret,Investigate,Justify,List,Outline,Present",
  "Language and Culture":
    "Analyse,Apply,Compare,Contrast,Describe,Discuss,Evaluate,Examine,Explain,Explore,Identify,Interpret,Justify",
  "Language B":
    "Analyse,Demonstrate,Describe,Discuss,Evaluate,Examine,Explain,Identify,Outline,Present,State",
  "Business Management":
    "Annotate,Apply,Calculate,Comment,Compare,Complete,Construct,Contrast,Define,Demonstrate,Describe,Discuss,Distinguish,Evaluate,Examine,Explain,Identify,Justify,Label,List,Outline,Plot,Prepare,Recommend,State,Suggest",
  "Economics":
    "Analyse,Apply,Calculate,Comment,Compare,Construct,Contrast,Define,Derive,Describe,Determine,Discuss,Distinguish,Draw,Evaluate,Examine,Explain,Identify,Justify,Label,List,Measure,Outline,Plot,Recommend,Show,Sketch,Solve,State,Suggest",
  "History":
    "Analyse,Discuss,Evaluate,Examine",
  "Psychology":
    "Analyse,Apply,Comment,Describe,Design,Discuss,Evaluate,Examine,Explain,Interpret,Predict,State,Suggest",
  "Biology":
    "Analyse,Annotate,Calculate,Comment,Compare,Construct,Deduce,Define,Describe,Design,Determine,Discuss,Distinguish,Draw,Estimate,Evaluate,Explain,Identify,Justify,Label,List,Measure,Outline,Predict,Sketch,State,Suggest",
  "Chemistry":
    "Analyse,Annotate,Calculate,Comment,Compare,Construct,Deduce,Define,Describe,Design,Determine,Discuss,Distinguish,Draw,Estimate,Evaluate,Explain,Identify,Justify,Label,List,Measure,Outline,Predict,Sketch,State,Suggest",
  "Design Technology":
    "Analyse,Apply,Construct,Demonstrate,Describe,Design,Evaluate,Explain,Identify,Justify,Label,List,Outline,Present,State",
  "Environmental Systems & Societies":
    "Analyse,Annotate,Apply,Calculate,Comment,Compare,Construct,Deduce,Define,Describe,Design,Determine,Discuss,Distinguish,Draw,Estimate,Evaluate,Explain,Identify,Interpret,Justify,Label,List,Measure,Outline,Predict,Sketch,State,Suggest",
  "Physics":
    "Analyse,Annotate,Calculate,Comment,Compare,Construct,Deduce,Define,Describe,Design,Determine,Discuss,Distinguish,Draw,Estimate,Evaluate,Explain,Identify,Justify,Label,List,Measure,Outline,Predict,Sketch,State,Suggest",
  "Mathematics: Analysis & Approaches":
    "Calculate,Comment,Compare,Construct,Contrast,Deduce,Determine,Draw,Explain,Find,Hence,Identify,Interpret,Investigate,Justify,Label,List,Plot,Predict,Prove,Show,Sketch,Solve,State,Suggest,Verify",
  "Mathematics: Applications & Interpretation":
    "Calculate,Comment,Compare,Construct,Contrast,Deduce,Determine,Draw,Explain,Find,Hence,Identify,Interpret,Investigate,Justify,Label,List,Plot,Predict,Prove,Show,Sketch,Solve,State,Suggest,Verify",
  "Film":
    "Analyse,Apply,Demonstrate,Describe,Discuss,Evaluate,Explain,Explore,Formulate,Identify,Interpret,Investigate,Justify,List",
  "Music":
    "Assemble,Approximate,Demonstrate,Describe,Distinguish,Exhibit,Explain,Explore,Formulate,Identify,Investigate,Justify,List,Outline,Recreate,Reiterate,Transmit",
  "Theatre":
    "Describe,Evaluate,Explain,List,Outline",
  "Visual Arts":
    "Analyse,Demonstrate,Describe,Evaluate,Examine,Explain,Justify,Outline,Present"
};

// Build per-subject arrays (deduplicated)
const SUBJECTS = {};
for (const [name, csv] of Object.entries(SUBJECTS_RAW)) {
  SUBJECTS[name] = [...new Set(csv.split(',').map(t => t.trim()))];
}

// All-subjects pool
const allTerms = [...new Set(Object.values(SUBJECTS).flat())].sort();
SUBJECTS['All subjects'] = allTerms;

// Session cache of validated words (pre-seeded with all command terms so
// they never need a network round-trip)
const wordCache = new Map(allTerms.map(t => [t.toUpperCase(), true]));

// Returns true if the word is in a standard English dictionary.
// Falls back to true if offline or the API is unavailable, so the
// game never blocks a guess purely due to network conditions.
async function isRealWord(word) {
  const key = word.toUpperCase();
  if (wordCache.has(key)) return wordCache.get(key);
  try {
    const res = await fetch(
      `https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`,
      { signal: AbortSignal.timeout(4000) }
    );
    const valid = res.ok;
    wordCache.set(key, valid);
    return valid;
  } catch {
    // Offline or timeout — give the benefit of the doubt
    return true;
  }
}

const SUBJECT_NAMES = ['All subjects', ...Object.keys(SUBJECTS_RAW).sort()];

// ── DOM refs ──────────────────────────────────────────────────────────────────
const subjectEl = document.getElementById('subject-select');
const newBtn    = document.getElementById('new-btn');
const infoEl    = document.getElementById('game-info');
const msgEl     = document.getElementById('message');
const gridEl    = document.getElementById('grid');
const kbEl      = document.getElementById('keyboard');

// Populate dropdown
SUBJECT_NAMES.forEach(name => {
  const opt = document.createElement('option');
  opt.value = opt.textContent = name;
  subjectEl.appendChild(opt);
});

// ── Game state ────────────────────────────────────────────────────────────────
let target = '', wordLen = 0, maxGuesses = 0;
let currentRow = 0, currentCol = 0;
let board = [];     // [row][col] = letter string
let gameOver = false;
let keyStates = {}; // letter → 'correct'|'present'|'absent'

// ── Cell sizing ───────────────────────────────────────────────────────────────
function calcCellSize(len) {
  const gap = 5;
  const available = Math.min(window.innerWidth - 24, 540);
  const raw = Math.floor((available - gap * (len - 1)) / len);
  return Math.min(54, Math.max(28, raw));
}

// ── Start / reset ─────────────────────────────────────────────────────────────
function startGame() {
  const pool = SUBJECTS[subjectEl.value];
  target = pool[Math.floor(Math.random() * pool.length)].toUpperCase();
  wordLen = target.length;
  maxGuesses = Math.max(6, wordLen);
  currentRow = 0;
  currentCol = 0;
  board = Array.from({ length: maxGuesses }, () => Array(wordLen).fill(''));
  gameOver = false;
  keyStates = {};
  msgEl.textContent = '';
  msgEl.className = '';
  infoEl.textContent = `${wordLen} letters · ${maxGuesses} guesses`;
  buildGrid();
  buildKeyboard();
}

// ── Grid ──────────────────────────────────────────────────────────────────────
function buildGrid() {
  gridEl.innerHTML = '';
  const cs = calcCellSize(wordLen);
  const fs = Math.round(cs * 0.42);

  for (let r = 0; r < maxGuesses; r++) {
    const row = document.createElement('div');
    row.className = 'grid-row';
    row.id = `row-${r}`;
    for (let c = 0; c < wordLen; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `cell-${r}-${c}`;
      cell.style.cssText = `width:${cs}px;height:${cs}px;font-size:${fs}px`;
      row.appendChild(cell);
    }
    gridEl.appendChild(row);
  }
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
const KB = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['ENTER','Z','X','C','V','B','N','M','⌫']
];

function buildKeyboard() {
  kbEl.innerHTML = '';
  KB.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'key-row';
    row.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k.length > 1 ? ' wide' : '');
      btn.textContent = k;
      btn.dataset.k = k;
      btn.addEventListener('pointerdown', e => { e.preventDefault(); handleKey(k); });
      rowEl.appendChild(btn);
    });
    kbEl.appendChild(rowEl);
  });
}

function refreshKeyboard() {
  kbEl.querySelectorAll('.key').forEach(btn => {
    const k = btn.dataset.k;
    const st = keyStates[k];
    btn.className = 'key' + (k.length > 1 ? ' wide' : '') + (st ? ` ${st}` : '');
  });
}

// ── Input ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter')          handleKey('ENTER');
  else if (e.key === 'Backspace') handleKey('⌫');
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

function handleKey(k) {
  if (gameOver) return;
  if (k === 'ENTER') submitGuess();
  else if (k === '⌫') deleteLetter();
  else addLetter(k);
}

function addLetter(letter) {
  if (currentCol >= wordLen) return;
  board[currentRow][currentCol] = letter;
  const cell = document.getElementById(`cell-${currentRow}-${currentCol}`);
  cell.textContent = letter;
  cell.classList.add('filled', 'pop');
  cell.addEventListener('animationend', () => cell.classList.remove('pop'), { once: true });
  currentCol++;
}

function deleteLetter() {
  if (currentCol <= 0) return;
  currentCol--;
  board[currentRow][currentCol] = '';
  const cell = document.getElementById(`cell-${currentRow}-${currentCol}`);
  cell.textContent = '';
  cell.classList.remove('filled');
}

async function submitGuess() {
  if (currentCol < wordLen) {
    shakeRow(currentRow);
    flash(`Need ${wordLen} letters`);
    return;
  }

  const guess = board[currentRow].join('');

  // Disable input while we check the dictionary
  gameOver = true;
  flash('Checking…');
  const valid = await isRealWord(guess);
  gameOver = false;

  if (!valid) {
    shakeRow(currentRow);
    flash('Not in dictionary');
    return;
  }
  msgEl.textContent = '';

  const result = scoreGuess(guess, target);

  // Reveal with flip animation
  result.forEach((state, c) => {
    setTimeout(() => {
      const cell = document.getElementById(`cell-${currentRow}-${c}`);
      cell.classList.add('flip');
      cell.addEventListener('animationend', () => {
        cell.classList.remove('flip');
        cell.classList.add(state);
      }, { once: true });
    }, c * 160);
  });

  const revealDone = wordLen * 160 + 80;
  setTimeout(() => {
    // Update key states (correct > present > absent)
    for (let c = 0; c < wordLen; c++) {
      const letter = guess[c];
      const state  = result[c];
      const prev   = keyStates[letter];
      if (prev === 'correct') continue;
      if (prev === 'present' && state !== 'correct') continue;
      keyStates[letter] = state;
    }
    refreshKeyboard();

    if (guess === target) {
      gameOver = true;
      const praise = ['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'];
      showMsg(praise[Math.min(currentRow, praise.length - 1)], 'win');
    } else {
      currentRow++;
      currentCol = 0;
      if (currentRow >= maxGuesses) {
        gameOver = true;
        showMsg(`The term was: ${target}`, 'lose');
      }
    }
  }, revealDone);
}

// Standard Wordle scoring (handles duplicate letters correctly)
function scoreGuess(guess, target) {
  const result = Array(wordLen).fill('absent');
  const tArr   = target.split('');
  const gArr   = guess.split('');

  // Pass 1: exact matches
  for (let i = 0; i < wordLen; i++) {
    if (gArr[i] === tArr[i]) {
      result[i] = 'correct';
      tArr[i]   = null;
      gArr[i]   = null;
    }
  }
  // Pass 2: present elsewhere
  for (let i = 0; i < wordLen; i++) {
    if (gArr[i] === null) continue;
    const j = tArr.indexOf(gArr[i]);
    if (j !== -1) {
      result[i] = 'present';
      tArr[j]   = null;
    }
  }
  return result;
}

// ── Feedback helpers ──────────────────────────────────────────────────────────
function shakeRow(r) {
  const rowEl = document.getElementById(`row-${r}`);
  rowEl.classList.add('row-shake');
  rowEl.addEventListener('animationend', () => rowEl.classList.remove('row-shake'), { once: true });
}

let flashTimer;
function flash(text) {
  msgEl.textContent = text;
  msgEl.className = '';
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => { if (!gameOver) msgEl.textContent = ''; }, 1500);
}

function showMsg(text, cls = '') {
  msgEl.textContent = text;
  msgEl.className = cls;
}

// ── Resize: rebuild grid if window resized ────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(buildGrid, 200);
});

// ── Wire controls ─────────────────────────────────────────────────────────────
subjectEl.addEventListener('change', startGame);
newBtn.addEventListener('click', startGame);

// ── Theme ─────────────────────────────────────────────────────────────────────
const themeButton = document.getElementById('theme-button');
const DARK_KEY = 'cmdterm-wordle-dark';
const LIGHT_KEY = 'cmdterm-wordle-light';

function updateAppChromeTheme(theme) {
    const tc = document.querySelector('meta[name="theme-color"]');
    const sb = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
    const dark = theme === 'dark';
    if (tc) tc.setAttribute('content', dark ? '#111118' : '#F4F4F8');
    if (sb) sb.setAttribute('content', dark ? 'black-translucent' : 'default');
}
function updateButtonEmoji(theme) {
    themeButton.textContent = theme === 'dark' ? '\u{1F319}' : '\u{2600}\uFE0F';
}
const initTheme = localStorage.getItem(DARK_KEY) ? 'dark' : 'light';
document.documentElement.setAttribute('data-theme', initTheme);
updateAppChromeTheme(initTheme);
updateButtonEmoji(initTheme);
window.addEventListener('pageshow', function () {
    updateAppChromeTheme(document.documentElement.getAttribute('data-theme'));
});
themeButton.addEventListener('click', function () {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    if (next === 'dark') {
        localStorage.setItem(DARK_KEY, 'true');
        localStorage.removeItem(LIGHT_KEY);
    } else {
        localStorage.setItem(LIGHT_KEY, 'true');
        localStorage.removeItem(DARK_KEY);
    }
    updateAppChromeTheme(next);
    updateButtonEmoji(next);
});

// ── Go ────────────────────────────────────────────────────────────────────────
startGame();
</script>

<!-- Brave iOS gradient text fix -->
<script>
(function () {
    if (/iP(hone|ad|od)/.test(navigator.userAgent) && navigator.brave) return;
    document.querySelectorAll('.banner-title').forEach(function (el) { el.classList.add('gradient-text'); });
})();
</script>
