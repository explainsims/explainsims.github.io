<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#E8F3FD">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- FOUC-free dark theme detection -->
    <script>
    (function() {
        if (localStorage.getItem('dictation-dark')) {
            document.documentElement.setAttribute('data-theme', 'dark');
            var tc = document.querySelector('meta[name="theme-color"]');
            var sb = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
            if (tc) tc.setAttribute('content', '#15243E');
            if (sb) sb.setAttribute('content', 'black-translucent');
        }
    })();
    </script>

    <title>Voice Dictation — PanPhy Labs</title>
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <script src="/assets/sw-register.js" defer></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Poppins:wght@600;700;800&display=swap');

        /* ── CSS Variables ── */
        :root {
            --font-sans: 'Inter', sans-serif;
            --font-display: 'Poppins', 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --bg-color: #E8F3FD;
            --bg-pattern: #D5E8F7;
            --text-main: #0D1B2A;
            --text-secondary: #4A6380;
            --brand-primary: #1A56DB;
            --brand-secondary: #1D4ED8;
            --brand-accent: #D97706;
            --card-bg: #FFFFFF;
            --card-border: #C5DCF0;
            --card-shadow: 0 4px 16px rgba(26,86,219,0.06);
            --canvas-bg: #FFFFFF;
            --slider-track: #C5DCF0;
            --slider-thumb: #1A56DB;
            --nav-bg: rgba(255,255,255,0.92);
            --nav-border: rgba(30,80,160,0.10);

            --rec-color: #DC2626;
            --rec-color-soft: rgba(220,38,38,0.12);
            --tab-active-bg: var(--brand-primary);
            --tab-active-text: #fff;
            --placeholder-color: #94a3b8;
            --badge-bg: rgba(26,86,219,0.10);
        }

        [data-theme="dark"] {
            --bg-color: #15243E;
            --bg-pattern: #1C2F52;
            --text-main: #EEF5FD;
            --text-secondary: #8BB3D4;
            --brand-primary: #F6C90E;
            --brand-secondary: #EAB308;
            --brand-accent: #60A5FA;
            --card-bg: #1C2F52;
            --card-border: #2A4270;
            --card-shadow: 0 4px 16px rgba(0,0,0,0.3);
            --canvas-bg: #15243E;
            --slider-track: #2A4270;
            --slider-thumb: #F6C90E;
            --nav-bg: rgba(21,36,62,0.90);
            --nav-border: rgba(255,255,255,0.08);

            --rec-color: #F87171;
            --rec-color-soft: rgba(248,113,113,0.15);
            --badge-bg: rgba(246,201,14,0.12);
        }

        /* ── Reset / Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        .offline-font body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--bg-pattern) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Banner ── */
        .banner {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: var(--nav-bg);
            border-bottom: 1px solid var(--nav-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            gap: 12px;
        }

        .banner-logo {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .banner-logo a img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
        }

        .banner-back {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: inherit;
            border-radius: 6px;
            opacity: 0.65;
            transition: opacity 0.15s;
        }
        .banner-back:hover { opacity: 1; }

        .banner-title {
            font-family: var(--font-display);
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: 700;
            flex: 1;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .banner-title.gradient-text {
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .banner-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

        #theme-button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px 6px;
            border-radius: 6px;
            line-height: 1;
        }

        /* ── Main Layout ── */
        .main-content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 20px 16px;
        }

        @media (min-width: 960px) {
            .main-content {
                grid-template-columns: 1fr 1fr;
                padding: 24px 24px;
                gap: 24px;
            }
        }

        /* ── Cards ── */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            padding: 20px;
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        /* ── Recording Panel ── */
        .recording-panel { display: flex; flex-direction: column; gap: 16px; }

        /* Record button */
        .record-btn-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #recordBtn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: var(--brand-primary);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 4px 20px rgba(26,86,219,0.35);
            transition: transform 0.15s, box-shadow 0.15s;
            position: relative;
            flex-shrink: 0;
        }

        #recordBtn:hover { transform: scale(1.06); box-shadow: 0 6px 28px rgba(26,86,219,0.45); }
        #recordBtn:active { transform: scale(0.97); }

        #recordBtn.is-recording {
            background: var(--rec-color);
            box-shadow: 0 4px 20px rgba(220,38,38,0.4);
            animation: rec-pulse 1.4s ease-in-out infinite;
        }

        @keyframes rec-pulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(220,38,38,0.4); }
            50% { box-shadow: 0 4px 32px rgba(220,38,38,0.65), 0 0 0 12px rgba(220,38,38,0.1); }
        }

        [data-theme="dark"] #recordBtn.is-recording {
            box-shadow: 0 4px 20px rgba(248,113,113,0.4);
            animation: rec-pulse-dark 1.4s ease-in-out infinite;
        }
        @keyframes rec-pulse-dark {
            0%, 100% { box-shadow: 0 4px 20px rgba(248,113,113,0.4); }
            50% { box-shadow: 0 4px 32px rgba(248,113,113,0.65), 0 0 0 12px rgba(248,113,113,0.1); }
        }

        #recordStatus {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
            min-height: 1.2em;
        }

        #recordTimer {
            font-family: var(--font-mono);
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--rec-color);
            display: none;
        }

        /* Waveform canvas */
        #waveformCanvas {
            width: 100%;
            height: 56px;
            border-radius: 8px;
            background: var(--rec-color-soft);
            display: none;
        }

        /* Interim transcript */
        #interimBox {
            min-height: 60px;
            padding: 10px 12px;
            border-radius: 8px;
            background: var(--badge-bg);
            border: 1px dashed var(--card-border);
            font-size: 0.88rem;
            color: var(--text-secondary);
            font-style: italic;
            display: none;
        }

        /* Browser support warning */
        #noSpeechWarning {
            padding: 12px;
            border-radius: 8px;
            background: rgba(220,38,38,0.08);
            border: 1px solid rgba(220,38,62,0.25);
            font-size: 0.85rem;
            color: var(--rec-color);
            display: none;
        }

        /* ── Note Editor Panel ── */
        .editor-panel { display: flex; flex-direction: column; gap: 12px; }

        #noteTitle {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            border-bottom: 2px solid var(--card-border);
            padding-bottom: 6px;
            transition: border-color 0.2s;
        }
        #noteTitle:focus { border-color: var(--brand-primary); }
        #noteTitle::placeholder { color: var(--placeholder-color); }

        /* Tabs */
        .tabs { display: flex; gap: 4px; background: var(--bg-color); padding: 3px; border-radius: 10px; width: fit-content; }
        .tab-btn {
            padding: 5px 14px;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            background: transparent;
            color: var(--text-secondary);
            transition: background 0.15s, color 0.15s;
        }
        .tab-btn.active {
            background: var(--tab-active-bg);
            color: var(--tab-active-text);
        }

        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        .note-content {
            min-height: 140px;
            max-height: 340px;
            overflow-y: auto;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: var(--canvas-bg);
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-main);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .note-content:empty::before,
        .note-content[data-placeholder]:empty::before {
            content: attr(data-placeholder);
            color: var(--placeholder-color);
            font-style: italic;
            pointer-events: none;
        }

        /* Polish rendered HTML */
        #polishedContent h1,
        #polishedContent h2,
        #polishedContent h3 {
            font-family: var(--font-display);
            color: var(--brand-primary);
            margin: 0.5em 0 0.25em;
        }
        #polishedContent p { margin-bottom: 0.5em; }
        #polishedContent ul, #polishedContent ol { padding-left: 1.4em; margin-bottom: 0.5em; }

        /* Action buttons */
        .note-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .btn:hover { background: var(--badge-bg); border-color: var(--brand-primary); color: var(--brand-primary); }
        .btn.btn-primary { background: var(--brand-primary); color: #fff; border-color: var(--brand-primary); }
        .btn.btn-primary:hover { opacity: 0.88; }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }

        /* ── Saved Notes Panel ── */
        .saved-panel {
            grid-column: 1 / -1;
        }

        @media (min-width: 960px) {
            .saved-panel { grid-column: 1 / -1; }
        }

        .saved-panel .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        #notesList {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
        }

        #notesList li {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: var(--bg-color);
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        #notesList li:hover { border-color: var(--brand-primary); background: var(--badge-bg); }
        #notesList li.active { border-color: var(--brand-primary); background: var(--badge-bg); }

        #notesList .note-name {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #notesList .note-time {
            font-size: 0.78rem;
            color: var(--text-secondary);
            white-space: nowrap;
            flex-shrink: 0;
        }

        #emptyNotesMsg {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-style: italic;
            padding: 8px 0;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--card-border);
            margin-top: auto;
        }
        footer a { color: var(--brand-primary); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* ── Reduced motion ── */
        @media (prefers-reduced-motion: reduce) {
            #recordBtn.is-recording { animation: none; }
            * { transition-duration: 0.01ms !important; }
        }

        /* ── Mobile touch targets ── */
        @media (pointer: coarse) {
            .tab-btn { padding: 8px 16px; }
            .btn { padding: 9px 16px; }
        }
    </style>
</head>

<body>
    <!-- Banner -->
    <header class="banner">
        <div class="banner-logo">
            <a href="/" title="Home"><img src="/assets/favicon.png" alt="Home"></a>
            <button class="banner-back" onclick="history.back()" title="Go back" aria-label="Go back">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                     aria-hidden="true"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
        </div>
        <div class="banner-title">Voice Dictation</div>
        <div class="banner-actions">
            <button id="theme-button" aria-label="Toggle Light/Dark Theme">&#9728;&#65039;</button>
        </div>
    </header>

    <!-- Main -->
    <div class="main-content">

        <!-- Recording panel -->
        <div class="card recording-panel">
            <div class="card-title">Recording</div>

            <div id="noSpeechWarning">
                ⚠️ Your browser doesn't support the Web Speech API. Try Chrome or Edge for live transcription.
            </div>

            <div class="record-btn-wrap">
                <button id="recordBtn" title="Start Recording" aria-label="Start Recording">
                    <!-- mic SVG -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                         id="micIcon" aria-hidden="true">
                        <path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
                        <path d="M19 10a7 7 0 0 1-14 0"/>
                        <line x1="12" y1="17" x2="12" y2="22"/>
                        <line x1="8" y1="22" x2="16" y2="22"/>
                    </svg>
                    <!-- stop SVG (hidden when not recording) -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"
                         id="stopIcon" aria-hidden="true" style="display:none;">
                        <rect x="4" y="4" width="16" height="16" rx="2"/>
                    </svg>
                </button>
                <span id="recordTimer">00:00</span>
                <span id="recordStatus">Ready to record</span>
            </div>

            <canvas id="waveformCanvas"></canvas>

            <div id="interimBox" aria-live="polite" aria-label="Live transcript"></div>
        </div>

        <!-- Note editor panel -->
        <div class="card editor-panel">
            <div class="card-title">Note Editor</div>

            <input type="text" id="noteTitle" placeholder="Untitled Note" autocomplete="off" spellcheck="true" />

            <div class="tabs">
                <button class="tab-btn active" data-tab="polished">Polished</button>
                <button class="tab-btn" data-tab="raw">Raw</button>
            </div>

            <div class="tab-pane active" id="tab-polished">
                <div class="note-content" id="polishedContent"
                     data-placeholder="Your polished note will appear here after recording…"></div>
            </div>
            <div class="tab-pane" id="tab-raw">
                <div class="note-content" id="rawContent"
                     data-placeholder="Raw transcript will appear here after recording…"></div>
            </div>

            <div class="note-actions">
                <button class="btn btn-primary" id="saveBtn">
                    <!-- save icon -->
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    Save
                </button>
                <button class="btn" id="copyBtn" title="Copy current tab as plain text">
                    <!-- copy icon -->
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="9" y="9" width="13" height="13" rx="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                    Copy
                </button>
                <button class="btn" id="newBtn" title="Start a new note">
                    <!-- plus icon -->
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    New
                </button>
                <button class="btn" id="exportBtn" title="Export all saved notes as a text file">
                    <!-- download icon -->
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Export
                </button>
            </div>
        </div>

        <!-- Saved notes panel -->
        <div class="card saved-panel">
            <div class="card-header">
                <div class="card-title" style="margin-bottom:0">Saved Notes</div>
                <span id="noteCount" style="font-size:0.78rem;color:var(--text-secondary);"></span>
            </div>
            <p id="emptyNotesMsg">No saved notes yet. Record something and tap Save.</p>
            <ul id="notesList" role="list" aria-label="Saved notes"></ul>
        </div>

    </div><!-- end .main-content -->

    <!-- Footer -->
    <footer>
        &copy; <a href="/">PanPhy Labs</a> |
        <a href="https://buymeacoffee.com/panphy" target="_blank" rel="noopener noreferrer">Support My Projects</a>
    </footer>

    <script>
    // ============================================================
    //  Theme toggle  (standard PanPhy pattern)
    // ============================================================
    const themeButton = document.getElementById('theme-button');
    const DARK_KEY  = 'dictation-dark';
    const LIGHT_KEY = 'dictation-light';

    function updateAppChromeTheme(theme) {
        const tc = document.querySelector('meta[name="theme-color"]');
        const sb = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
        const dark = theme === 'dark';
        if (tc) tc.setAttribute('content', dark ? '#15243E' : '#E8F3FD');
        if (sb) sb.setAttribute('content', dark ? 'black-translucent' : 'default');
    }

    function updateThemeEmoji(theme) {
        themeButton.textContent = theme === 'dark' ? '\u{1F319}' : '\u{2600}\uFE0F';
    }

    (function initTheme() {
        const t = localStorage.getItem(DARK_KEY) ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
        updateAppChromeTheme(t);
        updateThemeEmoji(t);
    })();

    window.addEventListener('pageshow', function () {
        updateAppChromeTheme(document.documentElement.getAttribute('data-theme'));
    });

    themeButton.addEventListener('click', function () {
        const cur = document.documentElement.getAttribute('data-theme');
        const next = cur === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        if (next === 'dark') {
            localStorage.setItem(DARK_KEY, '1');
            localStorage.removeItem(LIGHT_KEY);
        } else {
            localStorage.setItem(LIGHT_KEY, '1');
            localStorage.removeItem(DARK_KEY);
        }
        updateAppChromeTheme(next);
        updateThemeEmoji(next);
    });

    // Offline font fallback
    function syncOfflineFont() {
        document.documentElement.classList.toggle('offline-font', !navigator.onLine);
    }
    window.addEventListener('online', syncOfflineFont);
    window.addEventListener('offline', syncOfflineFont);
    syncOfflineFont();

    // ============================================================
    //  Tab switching
    // ============================================================
    document.querySelectorAll('.tab-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
            const tabId = this.dataset.tab;
            document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
            document.querySelectorAll('.tab-pane').forEach(function (p) { p.classList.remove('active'); });
            this.classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        });
    });

    // ============================================================
    //  Text polish — pure JS, no API key needed
    // ============================================================
    function polishText(raw) {
        if (!raw || !raw.trim()) return '';

        let text = raw.trim();

        // Remove stuttered consecutive duplicate words  (e.g. "I I went" → "I went")
        text = text.replace(/\b(\w+)\s+\1\b/gi, '$1');

        // Remove filler words / phrases
        const fillerRe = /\b(um+h?|uh+|er+|ah+|hmm+|mhm|you know,?\s*|I mean,?\s*|basically,?\s*|literally,?\s*|actually,?\s*|like,?\s*(?=\w)|so um,?\s*|well um,?\s*|right\?,?\s*|okay so,?\s*)\b/gi;
        text = text.replace(fillerRe, ' ');

        // Tidy whitespace
        text = text.replace(/\s+/g, ' ').trim();

        // Capitalise first letter of sentences
        text = text.replace(/(^|[.!?]\s+)([a-z])/g, function (_, pre, ch) { return pre + ch.toUpperCase(); });

        // Capitalise standalone "i"
        text = text.replace(/\bi\b/g, 'I');

        // Ensure the text ends with terminal punctuation
        if (text && !/[.!?]$/.test(text)) text += '.';

        return text;
    }

    // Minimal Markdown → HTML (supports headings, bold, italic, bullets, numbered lists, line breaks)
    function simpleMarkdown(md) {
        if (!md) return '';
        var lines = md.split('\n');
        var html = '';
        var inList = false;
        var inOl = false;

        lines.forEach(function (line) {
            // Heading
            var hm = line.match(/^(#{1,3})\s+(.*)/);
            if (hm) {
                if (inList)  { html += '</ul>'; inList = false; }
                if (inOl)    { html += '</ol>'; inOl = false; }
                var lvl = hm[1].length;
                html += '<h' + lvl + '>' + inline(hm[2]) + '</h' + lvl + '>';
                return;
            }
            // Bullet
            var bm = line.match(/^[\-\*\+]\s+(.*)/);
            if (bm) {
                if (inOl)   { html += '</ol>'; inOl = false; }
                if (!inList){ html += '<ul>'; inList = true; }
                html += '<li>' + inline(bm[1]) + '</li>';
                return;
            }
            // Ordered list
            var om = line.match(/^\d+\.\s+(.*)/);
            if (om) {
                if (inList) { html += '</ul>'; inList = false; }
                if (!inOl)  { html += '<ol>'; inOl = true; }
                html += '<li>' + inline(om[1]) + '</li>';
                return;
            }
            // End list
            if (inList)  { html += '</ul>'; inList = false; }
            if (inOl)    { html += '</ol>'; inOl = false; }
            // Empty line
            if (!line.trim()) { html += '<br>'; return; }
            html += '<p>' + inline(line) + '</p>';
        });

        if (inList) html += '</ul>';
        if (inOl)   html += '</ol>';
        return html;
    }

    function inline(t) {
        // Bold **text** or __text__
        t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        t = t.replace(/__(.+?)__/g, '<strong>$1</strong>');
        // Italic *text* or _text_
        t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
        t = t.replace(/_(.+?)_/g, '<em>$1</em>');
        return t;
    }

    // ============================================================
    //  Note state
    // ============================================================
    var notes = [];   // [{id, title, raw, polished, ts}]
    var currentNote = null;

    function newNote() {
        currentNote = { id: 'n_' + Date.now(), title: '', raw: '', polished: '', ts: Date.now() };
        document.getElementById('noteTitle').value = '';
        document.getElementById('polishedContent').innerHTML = '';
        document.getElementById('rawContent').textContent = '';
        document.getElementById('recordStatus').textContent = 'Ready to record';
    }

    function saveNote() {
        if (!currentNote) return;
        currentNote.title  = document.getElementById('noteTitle').value.trim() || 'Untitled Note';
        currentNote.raw    = document.getElementById('rawContent').textContent.trim();
        currentNote.polished = document.getElementById('polishedContent').innerText.trim();
        currentNote.ts     = Date.now();

        if (!currentNote.raw && !currentNote.polished) {
            document.getElementById('recordStatus').textContent = 'Nothing to save.';
            return;
        }

        var idx = notes.findIndex(function (n) { return n.id === currentNote.id; });
        if (idx === -1) notes.unshift(JSON.parse(JSON.stringify(currentNote)));
        else            notes[idx] = JSON.parse(JSON.stringify(currentNote));

        renderNotesList(currentNote.id);
        document.getElementById('recordStatus').textContent = 'Note saved.';
    }

    function loadNote(id) {
        var note = notes.find(function (n) { return n.id === id; });
        if (!note) return;
        currentNote = JSON.parse(JSON.stringify(note));
        document.getElementById('noteTitle').value = note.title || '';
        document.getElementById('rawContent').textContent = note.raw || '';
        document.getElementById('polishedContent').innerHTML = note.polished ? simpleMarkdown(note.polished) : '';
        document.getElementById('recordStatus').textContent = 'Loaded saved note.';
        renderNotesList(id);
    }

    function renderNotesList(activeId) {
        var list = document.getElementById('notesList');
        var empty = document.getElementById('emptyNotesMsg');
        var count = document.getElementById('noteCount');
        list.innerHTML = '';

        if (!notes.length) {
            empty.style.display = '';
            count.textContent = '';
            return;
        }
        empty.style.display = 'none';
        count.textContent = notes.length + ' note' + (notes.length !== 1 ? 's' : '');

        notes.forEach(function (n) {
            var li = document.createElement('li');
            if (activeId && n.id === activeId) li.classList.add('active');

            var nameEl = document.createElement('span');
            nameEl.className = 'note-name';
            nameEl.textContent = n.title || 'Untitled Note';

            var timeEl = document.createElement('span');
            timeEl.className = 'note-time';
            timeEl.textContent = new Date(n.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            li.appendChild(nameEl);
            li.appendChild(timeEl);
            li.addEventListener('click', function () { loadNote(n.id); });
            list.appendChild(li);
        });
    }

    function exportNotes() {
        if (!notes.length) { alert('No saved notes to export.'); return; }
        var text = notes.map(function (n) {
            return '# ' + (n.title || 'Untitled Note') + '\n\n' +
                   '## Polished\n' + (n.polished || '(empty)') + '\n\n' +
                   '## Raw\n' + (n.raw || '(empty)') + '\n\n' +
                   '---\n';
        }).join('\n');

        var blob = new Blob([text], { type: 'text/plain' });
        var url  = URL.createObjectURL(blob);
        var a    = document.createElement('a');
        a.href   = url;
        a.download = 'dictation-notes-' + new Date().toISOString().slice(0,10) + '.txt';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
    }

    // ============================================================
    //  Web Speech API — the core API-key-free adaptation
    // ============================================================
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    var recognition = null;
    var isRecording  = false;
    var timerInterval = null;
    var timerStart    = 0;
    var fullFinalTranscript = '';

    // Audio visualizer (Web Audio API — no recording, just visual)
    var audioCtx  = null;
    var analyser  = null;
    var micStream = null;
    var vizFrameId = null;

    var recordBtn  = document.getElementById('recordBtn');
    var micIcon    = document.getElementById('micIcon');
    var stopIcon   = document.getElementById('stopIcon');
    var timerEl    = document.getElementById('recordTimer');
    var statusEl   = document.getElementById('recordStatus');
    var interimBox = document.getElementById('interimBox');
    var canvas     = document.getElementById('waveformCanvas');
    var canvasCtx  = canvas.getContext('2d');

    if (!SpeechRecognition) {
        document.getElementById('noSpeechWarning').style.display = '';
        recordBtn.disabled = true;
    } else {
        recognition = new SpeechRecognition();
        recognition.continuous     = true;
        recognition.interimResults = true;
        recognition.lang           = navigator.language || 'en-US';

        recognition.onresult = function (event) {
            var interim = '';
            for (var i = event.resultIndex; i < event.results.length; i++) {
                var result = event.results[i];
                if (result.isFinal) {
                    fullFinalTranscript += result[0].transcript + ' ';
                } else {
                    interim += result[0].transcript;
                }
            }
            interimBox.textContent = interim || '';

            // Live update of raw content
            var display = fullFinalTranscript + (interim ? interim : '');
            document.getElementById('rawContent').textContent = display.trim();
        };

        recognition.onstart = function () {
            // Mic is confirmed open — safe to grab a second stream for the visualizer
            setupVisualizer();
        };

        recognition.onerror = function (e) {
            if (e.error === 'no-speech') return; // ignore silence gaps; onend will restart
            statusEl.textContent = 'Speech error: ' + e.error;
            stopRecording();
        };

        recognition.onend = function () {
            // Auto-restart after a brief delay to avoid InvalidStateError race condition
            if (isRecording) {
                setTimeout(function () {
                    if (!isRecording) return; // user stopped while we were waiting
                    try { recognition.start(); } catch (e) {
                        // If we still can't restart, bail out cleanly
                        stopRecording();
                    }
                }, 250);
            }
        };
    }

    function startRecording() {
        if (!recognition) return;
        fullFinalTranscript = '';
        document.getElementById('rawContent').textContent = '';
        document.getElementById('polishedContent').innerHTML = '';
        interimBox.textContent = '';
        interimBox.style.display = 'block';

        try { recognition.start(); } catch(e) { statusEl.textContent = 'Could not start: ' + e.message; return; }

        isRecording = true;
        recordBtn.classList.add('is-recording');
        recordBtn.setAttribute('title', 'Stop Recording');
        recordBtn.setAttribute('aria-label', 'Stop Recording');
        micIcon.style.display  = 'none';
        stopIcon.style.display = '';

        // Timer
        timerStart = Date.now();
        timerEl.style.display = 'block';
        timerInterval = setInterval(function () {
            var ms  = Date.now() - timerStart;
            var mm  = String(Math.floor(ms / 60000)).padStart(2, '0');
            var ss  = String(Math.floor((ms % 60000) / 1000)).padStart(2, '0');
            timerEl.textContent = mm + ':' + ss;
        }, 500);

        // Visualizer is started from recognition.onstart once mic is confirmed open

        statusEl.textContent = 'Listening…';
    }

    function stopRecording() {
        if (!isRecording) return;
        isRecording = false;

        try { recognition.stop(); } catch(_) {}

        clearInterval(timerInterval);
        timerEl.style.display  = 'none';
        timerEl.textContent    = '00:00';

        recordBtn.classList.remove('is-recording');
        recordBtn.setAttribute('title', 'Start Recording');
        recordBtn.setAttribute('aria-label', 'Start Recording');
        micIcon.style.display  = '';
        stopIcon.style.display = 'none';

        interimBox.textContent  = '';
        interimBox.style.display = 'none';

        teardownVisualizer();

        var raw = fullFinalTranscript.trim();
        if (!raw) { statusEl.textContent = 'No speech detected. Try again.'; return; }

        document.getElementById('rawContent').textContent = raw;

        // Polish with pure JS
        statusEl.textContent = 'Polishing note…';
        var polished = polishText(raw);
        document.getElementById('polishedContent').innerHTML = simpleMarkdown(polished);

        // Auto-fill title from first sentence
        var titleInput = document.getElementById('noteTitle');
        if (!titleInput.value.trim()) {
            var firstSentence = polished.split(/[.!?]/)[0].trim();
            titleInput.value = firstSentence.substring(0, 60) + (firstSentence.length > 60 ? '…' : '');
        }

        if (currentNote) {
            currentNote.raw     = raw;
            currentNote.polished = polished;
            currentNote.title   = titleInput.value;
        }

        statusEl.textContent = 'Done. Ready for next recording.';
    }

    recordBtn.addEventListener('click', function () {
        if (isRecording) stopRecording();
        else             startRecording();
    });

    document.getElementById('saveBtn').addEventListener('click', saveNote);
    document.getElementById('newBtn').addEventListener('click', function () {
        if (isRecording) stopRecording();
        newNote();
    });
    document.getElementById('copyBtn').addEventListener('click', function () {
        var activeTab = document.querySelector('.tab-pane.active');
        var text = activeTab ? activeTab.innerText.trim() : '';
        if (!text) return;
        navigator.clipboard.writeText(text).then(function () {
            var btn = document.getElementById('copyBtn');
            var orig = btn.innerHTML;
            btn.innerHTML = '✓ Copied';
            setTimeout(function () { btn.innerHTML = orig; }, 900);
        }).catch(function () {
            /* fallback silent fail */
        });
    });
    document.getElementById('exportBtn').addEventListener('click', exportNotes);

    // ============================================================
    //  Audio Visualizer (Web Audio API — no API key, no recording)
    // ============================================================
    function resizeCanvas() {
        var dpr  = window.devicePixelRatio || 1;
        var rect = canvas.getBoundingClientRect();
        canvas.width  = Math.round(rect.width  * dpr);
        canvas.height = Math.round(rect.height * dpr);
        canvasCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function setupVisualizer() {
        navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(function (stream) {
                micStream = stream;
                audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
                analyser  = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.75;
                audioCtx.createMediaStreamSource(stream).connect(analyser);

                canvas.style.display = 'block';
                resizeCanvas();
                drawViz();
            })
            .catch(function () { /* visualizer optional — speech still works */ });
    }

    function teardownVisualizer() {
        if (vizFrameId) { cancelAnimationFrame(vizFrameId); vizFrameId = null; }
        if (micStream)  { micStream.getTracks().forEach(function (t) { t.stop(); }); micStream = null; }
        if (audioCtx && audioCtx.state !== 'closed') { audioCtx.close(); }
        audioCtx = null; analyser = null;
        canvasCtx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
        canvas.style.display = 'none';
    }

    function getCSSVar(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function drawViz() {
        if (!analyser || !isRecording) return;
        vizFrameId = requestAnimationFrame(drawViz);

        var data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);

        var w   = canvas.clientWidth;
        var h   = canvas.clientHeight;
        var num = Math.floor(data.length * 0.5);
        var barW = Math.max(1, Math.floor(w / num * 0.7));
        var gap  = Math.max(0, Math.floor(w / num * 0.3));
        var x    = 0;

        canvasCtx.clearRect(0, 0, w, h);
        canvasCtx.fillStyle = getCSSVar('--rec-color') || '#DC2626';

        for (var i = 0; i < num; i++) {
            if (x >= w) break;
            var norm  = data[Math.floor(i * data.length / num)] / 255;
            var barH  = Math.max(2, Math.round(norm * h));
            var y     = Math.round((h - barH) / 2);
            canvasCtx.fillRect(Math.floor(x), y, barW, barH);
            x += barW + gap;
        }
    }

    window.addEventListener('resize', function () {
        if (isRecording && canvas.style.display === 'block') resizeCanvas();
    });

    // ============================================================
    //  Init
    // ============================================================
    newNote();
    renderNotesList();
    </script>

    <!-- Brave iOS gradient text fix -->
    <script>
    (function() {
        if (/iP(hone|ad|od)/.test(navigator.userAgent) && navigator.brave) return;
        document.querySelectorAll('.banner-title').forEach(function(el) {
            el.classList.add('gradient-text');
        });
    })();
    </script>
</body>
